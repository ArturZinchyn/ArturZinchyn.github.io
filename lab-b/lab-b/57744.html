<html lang="en">
<head>

    <section class="todo-list">

            </li>
            <li class="task">

            </li>
        </ul>
    </section>

    <section class="add-task">
        <input type="text" id="taskInput" placeholder="New task...">
        <input type="date" id="dateInput">
        <button id="addBtn">Save</button>
    </section>
</main>

</body>
